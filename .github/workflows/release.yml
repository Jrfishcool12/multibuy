name: Release

# Cuts a GitHub Release with the Windows .exe + installer whenever you push a
# version tag like  v1.0.0 .  Nothing here runs on ordinary commits.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The build happens on a GitHub-hosted Windows runner, so you never have to
# build locally again. The uploaded assets are what your users download.

on:
  push:
    tags:
      - "v*"
  # Lets you trigger a build by hand from the Actions tab (no release upload).
  workflow_dispatch:

permissions:
  contents: write   # needed for the job to create the Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pywebview pyinstaller certifi

      - name: Run test suite
        # Every test_*.py exits non-zero on failure, so a red test blocks the release.
        shell: pwsh
        run: |
          $failed = 0
          Get-ChildItem -Filter "test_*.py" | ForEach-Object {
            Write-Host "== $($_.Name) =="
            python $_.Name
            if ($LASTEXITCODE -ne 0) { $failed = 1 }
          }
          if ($failed -ne 0) { throw "One or more test suites failed" }

      - name: Build multibuy.exe
        run: >
          pyinstaller
          --noconfirm --clean
          --name multibuy
          --onefile
          --windowed
          --icon multibuy.ico
          --add-data "index.html;."
          --add-data "multibuy.ico;."
          --collect-all solders
          --collect-all solana
          --collect-all base58
          --collect-all certifi
          --collect-all cryptography
          --collect-submodules web3
          --collect-submodules eth_account
          --hidden-import cffi
          desktop.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" multibuy.iss'

      - name: Upload build artifacts (always available on the run page)
        uses: actions/upload-artifact@v4
        with:
          name: multibuy-windows
          path: |
            dist/multibuy-setup.exe
            dist/multibuy.exe

      - name: Publish GitHub Release
        # Only when triggered by a tag push; manual runs just build + upload artifacts.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: multibuy ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/multibuy-setup.exe
            dist/multibuy.exe
